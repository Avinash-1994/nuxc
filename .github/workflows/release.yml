name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.0.12)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write  # For npm provenance

jobs:
  verify:
    name: 🔍 Pre-Release Verification
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🦀 Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Type Check
        run: npm run typecheck

      - name: 🔍 Lint
        run: npm run lint

      - name: ✅ Run Tests
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npm test

      # ── Clean-up verification — must be zero before any release ──
      - name: 🚫 Verify no wasmtime references
        run: |
          COUNT=$(grep -r "wasmtime" packages/ src/ native/ --include="*.ts" --include="*.rs" --include="*.js" -l 2>/dev/null | wc -l)
          [ "$COUNT" -eq 0 ] && echo "✅ No wasmtime refs" || (echo "❌ wasmtime refs found — release blocked" && exit 1)

      - name: 🚫 Verify no leveldb/rocksdb references
        run: |
          COUNT=$(grep -r "leveldb\|rocksdb" packages/ src/ native/ --include="*.ts" --include="*.rs" --include="*.js" -l 2>/dev/null | wc -l)
          [ "$COUNT" -eq 0 ] && echo "✅ No leveldb/rocksdb refs" || (echo "❌ leveldb/rocksdb refs found — release blocked" && exit 1)

      - name: 🚫 Verify no express references
        run: |
          COUNT=$(grep -r "from 'express'\|require('express')" packages/ src/ --include="*.ts" --include="*.js" -l 2>/dev/null | wc -l)
          [ "$COUNT" -eq 0 ] && echo "✅ No express refs" || (echo "❌ express refs found — release blocked" && exit 1)

      # ── Quality Gates (P2-P6) ──
      - name: ✅ P2 — Source-Map Accuracy
        run: npx cross-env NODE_OPTIONS="--experimental-vm-modules" jest tests/source-maps/source_maps_suite.test.ts --testTimeout=30000 --forceExit
        env:
          CI: true

      - name: ✅ P3 — Tree-Shaking Efficiency
        run: npx cross-env NODE_OPTIONS="--experimental-vm-modules" jest tests/tree-shaking/tree_shaking_suite.test.ts --testTimeout=30000 --forceExit
        env:
          CI: true

      - name: ✅ P4 — SSR Hydration Mismatch Detection
        run: npx cross-env NODE_OPTIONS="--experimental-vm-modules" jest tests/ssr_hydration_mismatch.test.ts --testTimeout=30000 --forceExit
        env:
          CI: true

      - name: ✅ P6 — Strict TypeScript Build
        run: npx tsc -p tsconfig.build.json --noEmit

  build-and-release:
    name: 🚀 Build & Release
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: 🦀 Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔨 Build Project
        run: npm run build

      - name: 📦 Build Package Tarball
        run: |
          npm pack
          echo "✅ Pack complete"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nuce-*.tgz
            dist/nuce_native.node
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
